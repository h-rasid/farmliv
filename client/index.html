  <!-- Performance: Preconnect to CDNs (Max 4 recommended) -->

  <link rel="preconnect" href="https://res.cloudinary.com" />

    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"

    media="print"

  <!-- Anti-cache headers -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- LCP Preload: Responsive Hero Image (Strict Match for HeroCarousel/LazyImage logic) -->
  <link rel="preload" as="image" 
    href="https://res.cloudinary.com/dik8mlsie/image/upload/f_auto,q_auto:low,c_limit,w_1080/v1773817061/Shadenet_ew7jv2.webp" 
    imagesrcset="https://res.cloudinary.com/dik8mlsie/image/upload/f_auto,q_auto:low,c_limit,w_320/v1773817061/Shadenet_ew7jv2.webp 320w, https://res.cloudinary.com/dik8mlsie/image/upload/f_auto,q_auto:low,c_limit,w_640/v1773817061/Shadenet_ew7jv2.webp 640w, https://res.cloudinary.com/dik8mlsie/image/upload/f_auto,q_auto:low,c_limit,w_828/v1773817061/Shadenet_ew7jv2.webp 828w, https://res.cloudinary.com/dik8mlsie/image/upload/f_auto,q_auto:low,c_limit,w_1080/v1773817061/Shadenet_ew7jv2.webp 1080w, https://res.cloudinary.com/dik8mlsie/image/upload/f_auto,q_auto:low,c_limit,w_1280/v1773817061/Shadenet_ew7jv2.webp 1280w, https://res.cloudinary.com/dik8mlsie/image/upload/f_auto,q_auto:low,c_limit,w_1920/v1773817061/Shadenet_ew7jv2.webp 1920w" 
    imagesizes="(max-width: 640px) 100vw, (max-width: 1024px) 800px, 1920px" 
    fetchpriority="high" />

  <!-- Theme Color for Browser Chrome -->
  <meta name="theme-color" content="#2E7D32" />

  <!-- Critical Path CSS: Brand Identity & UI Stability -->
  <style data-critical="true">
    :root {
      --primary: 46 125 50;
      --background: 248 250 252;
      --text-primary: 15 23 42;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Poppins', -apple-system, system-ui, sans-serif;
      background-color: rgb(var(--background));
      color: rgb(var(--text-primary));
      -webkit-font-smoothing: antialiased;
    }
    #root { opacity: 1; min-height: 100vh; }
    
    /* Splash loader visibility - Deprecated */
    .loader-root { display: none !important; }
    
    /* Prevent FOUC for critical elements */
    h1, h2, h3 { font-family: 'Poppins', sans-serif; font-weight: 800; }
  </style>

  <!-- Self-healing script for cache recovery -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.target.tagName === 'SCRIPT' || (e.message && (e.message.includes('module script') || e.message.includes('Unexpected token')))) {
        if (window.location.search.indexOf('clear_cache=') === -1) {
          console.warn('Farmliv: Asset loading error. Forcing cache bypass...');
          window.location.replace(window.location.pathname + '?clear_cache=' + new Date().getTime());
        }
      }
    }, true);
  </script>
 </head>
 <body>
 <div id="root"></div>

 <script type="module" src="/src/main.jsx"></script>
 </body>
</html>
