<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Farmliv Industries Private Limited - Premium Agricultural Solutions" />
  <title>Farmliv Industries | Modern Agricultural Solutions</title>

  <!-- Performance: Preconnect to CDNs -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="preconnect" href="https://res.cloudinary.com" />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />

  <!-- Non-blocking Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </noscript>

  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dik8mlsie/image/upload/v1772023954/FARMLIV_-_1_-_Edited_vs802q.png" />
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dik8mlsie/image/upload/v1772023954/FARMLIV_-_1_-_Edited_vs802q.png" />

  <base href="/" />

  <!-- Anti-cache headers -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Critical Path CSS: Brand Identity & First Paint -->
  <style>
    :root {
      --primary: 46 125 50;
      --background: 248 250 252;
      --text-primary: 15 23 42;
    }
    body {
      margin: 0;
      font-family: 'Poppins', -apple-system, system-ui, sans-serif;
      background-color: rgb(var(--background));
      color: rgb(var(--text-primary));
      -webkit-font-smoothing: antialiased;
    }
    #root { opacity: 0; animation: fadeIn 0.4s ease-in forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    /* Splash loader visibility */
    .loader-root { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgb(var(--background)); z-index: 9999; }
  </style>

  <!-- Performance: Preload Critical Bundle -->
  <link rel="modulepreload" href="/src/main.jsx" />

  <!-- Self-healing script for cache recovery -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK' || (e.message && e.message.includes('module script'))) {
        if (window.location.search.indexOf('clear_cache=') === -1) {
          console.warn('Farmliv: Asset loading error. Forcing cache bypass...');
          window.location.replace(window.location.pathname + '?clear_cache=' + new Date().getTime());
        }
      }
    }, true);
  </script>
 </head>
 <body>
 <div id="root"></div>

 <script type="module" src="/src/main.jsx"></script>
 </body>
</html>
