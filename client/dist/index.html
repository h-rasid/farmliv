  <!-- Anti-cache headers -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <script data-critical="true">
    // High-priority CSS Interceptor: Converts Vite-injected CSS to non-blocking
    (function() {
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.tagName === 'LINK' && node.rel === 'stylesheet' && !node.hasAttribute('data-critical')) {
              node.media = 'print';
              node.onload = function() { 
                this.media = 'all'; 
                console.log('Farmliv: Styled bundle internalized.');
              };
            }
          });
        });
      });
      observer.observe(document.head, { childList: true });
    })();
  </script>

  <!-- Self-healing script for cache recovery -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.target.tagName === 'SCRIPT' || (e.message && (e.message.includes('module script') || e.message.includes('Unexpected token')))) {
        if (window.location.search.indexOf('clear_cache=') === -1) {
          console.warn('Farmliv: Asset loading error. Forcing cache bypass...');
          window.location.replace(window.location.pathname + '?clear_cache=' + new Date().getTime());
        }
      }
    }, true);
  </script>
