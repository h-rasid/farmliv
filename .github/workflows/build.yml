name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install root dependencies
        run: npm install
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build Frontend
        run: |
          cd client
          npm install
          npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # Note: This is a placeholder for deployment.
      # To actually deploy to Hostinger, you would typically use an FTP or SSH action.
      # For now, this ensures the build always runs and catches errors.
      - name: Verify Build
        run: ls -R client/dist

      - name: Commit and Push dist folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add client/dist -f
          git commit -m "Auto-build: Update production assets" || echo "No changes to commit"
          git push origin main
